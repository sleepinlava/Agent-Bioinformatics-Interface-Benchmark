# MetaTranscriptomics Analysis Configuration
# Valid fixture for metatranscriptomics analysis

analysis:
  type: metatranscriptomics
  description: "Gene expression quantification from metatranscriptomic RNA-seq data"

samples:
  sample_sheet: sample_sheet.tsv

tools:
  fastp:
    executable: fastp
    version: "0.23.4"
    env: metatranscriptomics
    purpose: "Adapter trimming and quality control"
  star:
    executable: STAR
    version: "2.7.11b"
    env: metatranscriptomics
    purpose: "Spliced alignment to reference genome"
  hisat2:
    executable: hisat2
    version: "2.2.1"
    env: metatranscriptomics
    purpose: "Splice-aware aligner (alternative to STAR)"
  samtools:
    executable: samtools
    version: "1.18"
    env: metatranscriptomics
    purpose: "BAM sorting and indexing"
  featureCounts:
    executable: featureCounts
    version: "2.0.6"
    env: subread
    purpose: "Gene-level read quantification"

resources:
  genome_index:
    path: resources/metaT_genome_index
    type: directory
    description: "STAR genome index directory"
  annotation_gtf:
    path: resources/metaT_annotation.gtf
    type: gtf
    description: "Gene annotation in GTF format"
  rrna_db:
    path: resources/rrna_db
    type: directory
    description: "SortMeRNA rRNA database for removal"

output:
  tables:
    - gene_expression.tsv
    - quality_metrics.tsv
  provenance_dir: provenance
  report_dir: report

workflow:
  steps:
    - id: trim_reads
      tool: fastp
      input: "read1, read2"
      output: trimmed_reads
    - id: align_reads
      tool: star
      input: trimmed_reads
      genome_index: genome_index
      output: aligned.bam
    - id: sort_bam
      tool: samtools
      input: aligned.bam
      output: sorted.bam
    - id: quantify_genes
      tool: featureCounts
      input: sorted.bam
      annotation: annotation_gtf
      output: gene_expression.tsv
