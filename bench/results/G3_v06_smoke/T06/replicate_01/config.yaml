# MetaPlasmid Analysis Configuration — MISSING RESOURCE
# This fixture references a database that does not exist on disk

analysis:
  type: metagenomic_plasmid
  description: "Plasmid identification and annotation from metagenomic assemblies"

samples:
  sample_sheet: sample_sheet.tsv

tools:
  prodigal:
    executable: prodigal
    version: "2.6.3"
    env: metagenomic_plasmid
  hmmer:
    executable: hmmscan
    version: "3.3.2"
    env: metagenomic_plasmid
  genomad:
    executable: genomad
    version: "1.5.2"
    env: genomad

resources:
  genomad_db:
    path: missing/genomad_db_v2
    type: directory
    description: "geNomad model and database directory — MISSING"
  pfam_hmm:
    path: resources/Pfam-A.hmm
    type: hmm
    description: "Pfam HMM profiles"

output:
  tables:
    - plasmid_annotations.tsv
  provenance_dir: provenance
  report_dir: report
