analysis:
  type: amplicon_16s
  description: "16S rRNA amplicon microbial community analysis"

samples:
  sample_sheet: sample_sheet.tsv

tools:
  cutadapt:
    executable: cutadapt
    version: "4.6"
    env: amplicon
  vsearch_derep:
    executable: vsearch
    version: "2.27.0"
    env: amplicon
  vsearch_denoise:
    executable: vsearch
    version: "2.27.0"
    env: amplicon
  vsearch_taxonomy:
    executable: vsearch
    version: "2.27.0"
    env: amplicon
  diversity_metrics:
    executable: python
    version: "3.10"
    env: amplicon

resources:
  taxonomy_db:
    path: resources/silva_138.fasta
    type: file

output:
  tables:
    - asv_table.tsv
    - taxonomy.tsv
  provenance_dir: provenance
  report_dir: report

workflow:
  steps:
    - id: primer_trimming
      tool: cutadapt
      input: read1,read2
      output: trimmed_reads
    - id: dereplicate
      tool: vsearch_derep
      input: merged_fasta
      output: derep.fasta
    - id: denoise
      tool: vsearch_denoise
      input: derep.fasta
      output: asvs.fasta
    - id: taxonomy
      tool: vsearch_taxonomy
      input: asvs.fasta
      database: taxonomy_db
      output: taxonomy.tsv
    - id: diversity
      tool: diversity_metrics
      input: asv_table
      output: diversity
