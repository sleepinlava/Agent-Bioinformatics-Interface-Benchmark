analysis:
  type: viral_viwrap

workflow:
  steps:
    - id: check_env
      tool: viwrap_check
    - id: validate
      tool: viwrap_validate
    - id: run
      tool: viwrap

tools:
  viwrap_check:
    executable: viwrap
    env: viwrap_missing
  viwrap_validate:
    executable: viwrap
    env: viwrap_missing
  viwrap:
    executable: viwrap
    env: viwrap_missing

resources:
  viwrap_db: missing/viwrap_db
  checkv_db: missing/checkv_db

samples:
  - sample_id: ASSEMBLY_001
    assembly: data/assembly.fasta
