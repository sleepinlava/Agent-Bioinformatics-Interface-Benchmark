# MetaPlasmid Analysis Configuration — TOOL NOT FOUND
# This fixture references a tool not available in PATH

analysis:
  type: metagenomic_plasmid
  description: "Plasmid identification and annotation from metagenomic assemblies"

samples:
  sample_sheet: sample_sheet.tsv

tools:
  prodigal:
    executable: prodigal
    version: "2.6.3"
    env: metagenomic_plasmid
  hmmer:
    executable: hmmscan
    version: "3.3.2"
    env: metagenomic_plasmid
  plasflow:
    executable: PlasFlow.py
    version: "1.1"
    env: plasflow_env
    description: "Plasmid prediction from metagenomic contigs — NOT INSTALLED"

resources:
  pfam_hmm:
    path: resources/Pfam-A.hmm
    type: hmm

output:
  tables:
    - plasmid_predictions.tsv
  provenance_dir: provenance
  report_dir: report
