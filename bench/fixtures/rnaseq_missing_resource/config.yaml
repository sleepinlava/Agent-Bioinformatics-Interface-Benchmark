analysis:
  type: rnaseq_expression
  description: "Standard RNA-seq differential expression analysis — MISSING RESOURCE"

samples:
  sample_sheet: sample_sheet.tsv

tools:
  fastp:
    executable: fastp
    version: "0.23.4"
    env: rnaseq
  star:
    executable: STAR
    version: "2.7.11b"
    env: rnaseq
  featurecounts:
    executable: featureCounts
    version: "2.0.6"
    env: rnaseq
  deseq2:
    executable: Rscript
    version: "1.42.0"
    env: rnaseq

resources:
  genome_index:
    path: missing/star_index_v40
    type: directory
    description: "STAR genome index directory — MISSING"
  annotation_gtf:
    path: resources/genes.gtf
    type: file
    description: "Gene annotation GTF file"

output:
  tables:
    - gene_expression.tsv
    - differential_expression.tsv
  provenance_dir: provenance
  report_dir: report

workflow:
  steps:
    - id: qc
      tool: fastp
      input: read1,read2
      output: trimmed_reads
    - id: alignment
      tool: star
      input: trimmed_reads
      database: genome_index
      output: aligned.bam
    - id: quantification
      tool: featurecounts
      input: aligned.bam
      database: annotation_gtf
      output: gene_expression.tsv
    - id: diff_expression
      tool: deseq2
      input: gene_expression.tsv
      output: differential_expression.tsv
