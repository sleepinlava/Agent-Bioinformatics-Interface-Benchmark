# MetaPlasmid Analysis Configuration — MISSING INPUT
# This fixture deliberately has a sample with a nonexistent read1 path

analysis:
  type: metagenomic_plasmid
  description: "Plasmid identification and annotation from metagenomic assemblies"

samples:
  sample_sheet: sample_sheet.tsv

tools:
  prodigal:
    executable: prodigal
    version: "2.6.3"
    env: metagenomic_plasmid
  hmmer:
    executable: hmmscan
    version: "3.3.2"
    env: metagenomic_plasmid
  genomad:
    executable: genomad
    version: "1.5.2"
    env: genomad

resources:
  genomad_db:
    path: /data/databases/genomad/genomad_db
    type: directory
  pfam_hmm:
    path: /data/databases/pfam/Pfam-A.hmm
    type: hmm

output:
  tables:
    - plasmid_annotations.tsv
  provenance_dir: provenance
  report_dir: report
