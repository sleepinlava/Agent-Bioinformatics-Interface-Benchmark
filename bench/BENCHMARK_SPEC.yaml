benchmark:
  name: ABI-Bench
  version: "0.9"
  benchmark_type: agent_bioinformatics_interface
  primary_claim: >
    ABI is a structured control layer that improves LLM agent operability
    of bioinformatics workflows across model capability tiers. The improvement
    is strongest for weaker models (scaffolding effect), and the same ABI
    lifecycle transfers across multiple workflow plugins. Real-execution
    case studies demonstrate that ABI-driven pipelines produce outputs
    consistent with human expert baselines.

  secondary_claim: >
    ABI component-level contributions (provenance, diagnostic hints,
    permission model) are documented in Appendix. Strong LLMs compensate
    for removed components through chain-of-thought reasoning, making
    component-level ablation inconclusive — a finding reported transparently.

environment:
  agent_harness: direct
  model_id: multi           # v0.3: multi-model experiment
  temperature: 0.3             # Default sampling temperature (increased from 0.0
                                #   to ensure replicate runs vary — see Fix 1 in audit)
  max_agent_steps: 50
  task_timeout_minutes: 20
  network: false
  real_tool_execution_default: false

# ═══════════════════════════════════════════════════════════════════════
# v0.3 Model Tier System
# ═══════════════════════════════════════════════════════════════════════
model_tiers:
  tier_assignment_method: >
    Tiers are frozen in bench/model_tiers.yaml before benchmark outcomes are
    collected, using external capability evidence and native-precision model
    configuration. Outcome-based reclassification is forbidden because using
    observed G1 scores to define tiers biases the Group × Tier interaction.
    Unregistered models receive tier "unknown" and require a preregistered
    amendment before they can contribute to the scaffolding claim.
  strong:
    description: "Frontier models with strong reasoning capabilities"
    models:
      - gpt-4o
      - claude-sonnet-4-6
      - deepseek-v4-pro
  medium:
    description: "Mid-tier models with adequate reasoning"
    models:
      - gpt-4o-mini
      - qwen2.5-72b
  weak:
    description: "Smaller models where scaffolding effect is most pronounced"
    models:
      - qwen2.5-7b
      - llama-3.1-8b

# ═══════════════════════════════════════════════════════════════════════
# Plugin Balance (Fix 5)
# ═══════════════════════════════════════════════════════════════════════
plugin_balance:
  note: >
    metagenomic_plasmid remains overrepresented. v0.9 adds held-out diagnosis
    for RNA-seq, WGS, and easymetagenome, but per-plugin task counts remain
    asymmetric and must be reported separately.
  distribution:
    metagenomic_plasmid: 27
    rnaseq_expression: 10
    wgs_bacteria: 7
    amplicon_16s: 5
    metatranscriptomics: 4
    easymetagenome: 4
