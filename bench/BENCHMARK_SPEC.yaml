benchmark:
  name: ABI-Bench
  version: "0.4"
  benchmark_type: agent_bioinformatics_interface
  primary_claim: >
    ABI is a structured control layer that improves LLM agent operability
    of bioinformatics workflows across model capability tiers. The improvement
    is strongest for weaker models (scaffolding effect), and the same ABI
    lifecycle transfers across multiple workflow plugins. Real-execution
    case studies demonstrate that ABI-driven pipelines produce outputs
    consistent with human expert baselines.

  secondary_claim: >
    ABI component-level contributions (provenance, diagnostic hints,
    permission model) are documented in Appendix. Strong LLMs compensate
    for removed components through chain-of-thought reasoning, making
    component-level ablation inconclusive — a finding reported transparently.

environment:
  agent_harness: direct
  model_id: multi           # v0.3: multi-model experiment
  temperature: 0
  max_agent_steps: 50
  task_timeout_minutes: 20
  network: false
  real_tool_execution_default: false

# ═══════════════════════════════════════════════════════════════════════
# v0.3 Model Tier System
# ═══════════════════════════════════════════════════════════════════════
model_tiers:
  strong:
    description: "Frontier models with strong reasoning capabilities"
    models:
      - gpt-4o
      - claude-sonnet-4-6
      - deepseek-v4-pro
  medium:
    description: "Mid-tier models with adequate reasoning"
    models:
      - gpt-4o-mini
      - qwen2.5-72b
  weak:
    description: "Smaller models where scaffolding effect is most pronounced"
    models:
      - qwen2.5-7b
      - llama-3.1-8b

plugins:
  - metagenomic_plasmid
  - metatranscriptomics
  - amplicon_16s
  - rnaseq_expression
  - wgs_bacteria

main_groups:
  - G1
  - G2
  - G3
  - G4        # v0.3: information-matched docs (no lifecycle API)

ablation_groups:
  - A1
  - A3
  - A4

# ═══════════════════════════════════════════════════════════════════════
# Ablation experiment status (2026-06-17, carried forward)
#
# Real LLM experiments revealed that strong reasoning models compensate
# for removed ABI components through chain-of-thought reasoning,
# resulting in minimal observed score differences (A1: -0.9, A3: -0.1,
# A4: +0.9 vs G3).  Simulated ablation confirmed the design validity
# (A1: -48.3, A3: -24.1, A4: -10.3), but real LLMs compensate for
# ~98% of the removed functionality.
#
# Decision: Ablation downgraded from primary evidence to Appendix.
# v0.3: Ablation groups retained in Appendix only; not in main experiment.
# ═══════════════════════════════════════════════════════════════════════
ablation_status:
  simulated: "confirmed design validity"
  real_llm: "inconclusive — LLM compensatory behavior"
  paper_placement: "Appendix A"
  decision_document: "abi/docs/ablation_decision.md"

