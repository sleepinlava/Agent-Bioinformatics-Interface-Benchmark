# ═══════════════════════════════════════════════════════════════════════
# Ablation experiment status (2026-06-17, carried forward)
#
# Real LLM experiments revealed that strong reasoning models compensate
# for removed ABI components through chain-of-thought reasoning,
# resulting in minimal observed score differences (A1: -0.9, A3: -0.1,
# A4: +0.9 vs G3).  Simulated ablation confirmed the design validity
# (A1: -48.3, A3: -24.1, A4: -10.3), but real LLMs compensate for
# ~98% of the removed functionality.
#
# Decision: Ablation downgraded from primary evidence to Appendix.
# v0.3: Ablation groups retained in Appendix only; not in main experiment.
# ═══════════════════════════════════════════════════════════════════════
ablation_status:
  simulated: "confirmed design validity"
  real_llm: "inconclusive — LLM compensatory behavior"
  paper_placement: "Appendix A"
  decision_document: "abi/docs/ablation_decision.md"

