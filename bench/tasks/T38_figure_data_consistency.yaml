# bench/tasks/T38_figure_data_consistency.yaml
task_id: T38
name: Figure-data consistency — cross-validate charts against source tables
plugin: amplicon_16s
task_type: figure_data_consistency
fixture: figure_data_consistency
max_score: 14
timeout_minutes: 20
max_agent_steps: 40

prompt: |
  You have an amplicon_16s analysis workspace with results including figures
  and standard tables. Your task is to cross-validate:

  1. alpha_diversity.svg Shannon values == tables/alpha_diversity.tsv values
  2. taxonomy_barplot.svg genus names == tables/taxonomy.tsv genus column
  3. pcoa.svg sample clustering == tables/beta_diversity.tsv distance matrix
  4. rarefaction_curve.svg asymptote == actual observed features count

  For each check:
  - Extract the numerical value from the table
  - Inspect the figure (read axis labels, legend text from the image metadata or by
    grepping the source data used to render it)
  - Report: "consistent" if values match, "discrepancy" with specifics if not

  Write to final_answer.json:
  {
    "schema_version": "abi-bench.final_answer.v1",
    "task_type": "figure_data_consistency",
    "checks": [
      {
        "check": "shannon_diversity",
        "table_value": <float>,
        "figure_value": <float>,
        "consistent": true/false,
        "evidence": "<how you verified — e.g., axis label, legend text>"
      },
      {
        "check": "taxonomy_genera",
        "table_genera": ["genus1", "genus2", ...],
        "figure_genera": ["genus1", "genus2", ...],
        "consistent": true/false,
        "evidence": "..."
      },
      {
        "check": "pcoa_clustering",
        "table_clusters": "<description>",
        "figure_clusters": "<description>",
        "consistent": true/false,
        "evidence": "..."
      },
      {
        "check": "rarefaction_asymptote",
        "table_observed": <int>,
        "figure_asymptote": <int>,
        "consistent": true/false,
        "evidence": "..."
      }
    ],
    "summary": {"total_checks": 4, "consistent": <N>, "discrepant": <N>}
  }

allowed_actions:
  read_files: true
  write_files: true
  run_shell: true
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  shannon_check:
    points: 4
    function: check_json_expected_records
    args:
      list_path: checks
      key_field: check
      required_fields: [table_value, figure_value, consistent, evidence]
      expected_records:
        shannon_diversity: {table_value: 3.2, figure_value: 3.2, consistent: true}
  taxonomy_check:
    points: 5
    function: check_json_expected_records
    args:
      list_path: checks
      key_field: check
      required_fields: [table_genera, figure_genera, consistent, evidence]
      expected_records:
        taxonomy_genera:
          table_genera: [Bacteroides, Faecalibacterium, Prevotella]
          figure_genera: [Bacteroides, Faecalibacterium, Prevotella]
          consistent: true
  pcoa_check:
    points: 5
    function: check_json_expected_records
    args:
      list_path: checks
      key_field: check
      required_fields: [consistent, evidence]
      expected_records:
        pcoa_clustering: {consistent: true}
        rarefaction_asymptote: {table_observed: 128, figure_asymptote: 128, consistent: true}

failure_codes:
  - artifact_missing
  - diagnosis_incomplete
  - timeout
