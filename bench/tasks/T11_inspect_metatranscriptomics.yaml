task_id: T11
name: Inspect metatranscriptomics
plugin: metatranscriptomics
task_type: inspection
fixture: transcriptomics_valid
max_score: 9
timeout_minutes: 15
max_agent_steps: 40

prompt: |
  Inspect the dry-run results for metatranscriptomics analysis.
  Read the provenance artifacts and report:
  1. Identify the genome index placeholder.
  2. Identify the annotation GTF placeholder.
  3. Explain that dry-run gene expression values are not real biological results.
  4. List what must be configured before real execution.

  Write both final_answer.md and final_answer.json.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: false
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  identifies_genome_index_placeholder: 1
  identifies_annotation_gtf_placeholder: 1
  explains_dryrun_limits: 1
  lists_real_execution_requirements: 2
  structured_placeholder_check: 3
  final_answer_has_structure: 1

failure_codes:
  - artifact_missing
  - diagnosis_wrong
  - overclaim_result
  - timeout
  - agent_loop
