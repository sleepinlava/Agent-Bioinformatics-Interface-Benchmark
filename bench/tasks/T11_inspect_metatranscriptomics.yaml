task_id: T11
name: Inspect metatranscriptomics
plugin: metatranscriptomics
task_type: inspection
fixture: transcriptomics_valid
max_score: 9
timeout_minutes: 15
max_agent_steps: 40

prompt: |
  Inspect the dry-run results for metatranscriptomics analysis.
  Read the provenance artifacts and report:
  1. Identify the genome index placeholder.
  2. Identify the annotation GTF placeholder.
  3. Explain that dry-run gene expression values are not real biological results.
  4. List what must be configured before real execution.

  Write both final_answer.md and final_answer.json. JSON must include
  genome_index_status, annotation_gtf_status, is_dry_run,
  dry_run_limitations, and real_execution_requirements.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: false
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  resource_status_evidence:
    points: 2
    function: check_json_contract
    args:
      allowed_values:
        genome_index_status: [placeholder, missing, not_configured]
        annotation_gtf_status: [placeholder, missing, not_configured]
  dryrun_limit_evidence:
    points: 1
    function: check_json_contract
    args: {equals: {is_dry_run: true}, min_items: {dry_run_limitations: 1}}
  execution_requirement_evidence:
    points: 2
    function: check_json_contract
    args: {min_items: {real_execution_requirements: 2}}
  structured_placeholder_check: 3
  final_answer_has_structure: 1

failure_codes:
  - artifact_missing
  - diagnosis_wrong
  - overclaim_result
  - timeout
  - agent_loop
