task_id: T48
name: Plan easymetagenome analysis
plugin: easymetagenome
task_type: planning
fixture: easymeta_valid
max_score: 10
timeout_minutes: 20
max_agent_steps: 50

prompt: |
  Create an execution plan for a shotgun metagenomics analysis using the
  easymetagenome plugin. Your plan should include the standard P0 taxonomy
  workflow steps (fastp QC, KneadData host removal, Kraken2 taxonomy,
  Bracken abundance). Write the execution plan to execution_plan.json.

  Read config.yaml and any manifest files first. Use the interfaces available
  to you to construct a valid plan; do not execute the workflow.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: true
  real_tool_execution: false
  network: false

expected_artifacts:
  - execution_plan.json

scoring:
  execution_plan_exists: 1
  analysis_type_is_easymetagenome: 2
  step_id_unique:
    points: 2
    function: check_unique_step_ids
  tool_id_valid_for_easymeta: 2
  plan_not_executed:
    points: 1
    function: check_no_real_execution
  contains_fastp:
    points: 1
    function: check_json_contains_tool
    args: {relpath: execution_plan.json, tool_id: fastp}
  contains_kraken2:
    points: 1
    function: check_json_contains_tool
    args: {relpath: execution_plan.json, tool_id: kraken2}

failure_codes:
  - artifact_missing
  - invalid_plan_schema
  - wrong_analysis_type
  - real_execution_violation
