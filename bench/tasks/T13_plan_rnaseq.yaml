task_id: T13
name: Plan RNA-seq expression analysis
plugin: rnaseq_expression
task_type: planning
fixture: rnaseq_valid
max_score: 8
timeout_minutes: 15
max_agent_steps: 40

prompt: |
  Create an execution plan for RNA-seq gene expression analysis.
  The plan must specify analysis_type "rnaseq_expression",
  include unique step_ids, and reference valid tool_ids
  (fastp, star, featurecounts, deseq2) from the workspace configuration.
  Do not execute any real bioinformatics tools.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: false
  real_tool_execution: false
  network: false

expected_artifacts:
  - execution_plan.json

scoring:
  execution_plan_exists:
    points: 2
    args:
      relpath: "execution_plan.json"
  analysis_type_rnaseq:
    points: 2
    args:
      relpath: "execution_plan.json"
      field: "analysis_type"
      expected: "rnaseq_expression"
  step_ids_unique:
    points: 2
  tool_ids_valid:
    points: 1
  plan_no_execution:
    points: 1

failure_codes:
  - artifact_missing
  - wrong_analysis_type
  - invalid_plan_schema
  - real_execution_violation
  - timeout
  - agent_loop
