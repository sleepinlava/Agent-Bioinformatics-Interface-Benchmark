task_id: T22
name: Complex diagnosis — multiple simultaneous faults
plugin: metagenomic_plasmid
task_type: diagnosis
fixture: plasmid_missing_input     # Will use both missing_input and missing_resource fixtures
public_fixture: plasmid_missing_input
hidden_fixture: plasmid_hidden_missing_input
max_score: 14
timeout_minutes: 20
max_agent_steps: 50

prompt: |
  Diagnose ALL failures in the provided workspace. The workspace may contain
  MULTIPLE simultaneous issues (e.g., both a missing input AND a missing
  resource). You must identify every fault present.

  For each fault, specify:
  - The cause type (missing_input, missing_resource, or tool_not_found)
  - The affected sample_id, field, path, or resource
  - The config key or tool_id involved
  - A suggested fix

  CRITICAL: Do NOT stop after finding the first fault. Systematically check
  all potential failure modes. The workspace may have 1-3 simultaneous faults.

  Write a structured final_answer.json with a "faults" array, where each
  element follows the standard diagnosis schema:
  {
    "schema_version": "abi-bench.final_answer.v1",
    "task_type": "multi_error_diagnosis",
    "faults": [
      {
        "cause": "<missing_input|missing_resource|tool_not_found>",
        "sample_id": "<affected sample>",
        "field": "<affected field>",
        "path": "<incorrect path>",
        "resource": "<affected resource>",
        "config_key": "<config key path>",
        "tool_id": "<affected tool>",
        "executable": "<expected executable>",
        "env": "<expected environment>",
        "fix": "<corrective action>",
        "confidence": "<high|medium|low>"
      }
    ],
    "total_faults_found": <N>,
    "systematic_check_performed": true
  }

allowed_actions:
  read_files: true
  write_files: true
  run_shell: true
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  diagnostic_identifies_missing_input:
    points: 2
  diagnostic_identifies_missing_resource:
    points: 2
  # New structured check for multi-error diagnosis
  structured_multi_error_diagnosis:
    points: 6
  diagnostic_gives_fix:
    points: 2
  no_diagnosis_contradiction:
    points: 1
  final_answer_has_structure:
    points: 1

failure_codes:
  - artifact_missing
  - diagnosis_incomplete
  - diagnosis_wrong
  - missed_secondary_fault
  - timeout
  - agent_loop
