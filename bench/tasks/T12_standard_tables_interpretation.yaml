task_id: T12
name: Interpret standard tables
plugin: both
task_type: result_interpretation
fixture: plasmid_valid
max_score: 7
timeout_minutes: 15
max_agent_steps: 30

prompt: |
  Examine the standard tables generated by a previous dry-run.
  Report:
  1. Which standard tables are present and their names.
  2. The structure and meaning of each table.
  3. Distinguish between empty tables, tables with only headers, and tables with result rows.
  4. Do not over-interpret dry-run results as real biological findings.

  Write both final_answer.md and final_answer.json. JSON must include table_name,
  columns, row_count, is_empty, has_header, and
  overclaims_biological_findings.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: false
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  table_identity_evidence:
    points: 2
    function: check_json_contract
    args:
      equals: {table_name: plasmid_annotations.tsv, row_count: 2, is_empty: false, has_header: true}
      min_items: {columns: 4}
  interpretation_safety_evidence:
    points: 2
    function: check_json_contract
    args: {equals: {overclaims_biological_findings: false}}
  structured_table_interpretation: 2
  final_answer_has_structure: 1

failure_codes:
  - artifact_missing
  - overclaim_result
  - timeout
  - agent_loop
