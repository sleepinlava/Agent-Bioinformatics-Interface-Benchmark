task_id: T05
name: Diagnose missing input
plugin: metagenomic_plasmid
task_type: diagnosis
fixture: plasmid_missing_input
public_fixture: plasmid_missing_input
hidden_fixture: plasmid_hidden_missing_input
max_score: 10
timeout_minutes: 15
max_agent_steps: 40

prompt: |
  Diagnose the failure preventing the metagenomic plasmid analysis from
  proceeding. Inspect the workspace systematically and report your findings
  in the standard diagnosis output format.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: true
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  diagnostic_identifies_missing_input: 2
  structured_missing_input_diagnosis: 6
  diagnostic_gives_fix: 2

failure_codes:
  - artifact_missing
  - diagnosis_wrong
  - diagnosis_incomplete
  - timeout
  - agent_loop
