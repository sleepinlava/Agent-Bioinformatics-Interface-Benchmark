task_id: T61
name: Held-out diagnosis — shotgun metagenomics
plugin: easymetagenome
task_type: diagnosis
fixture: easymeta_single_missing_resource
public_fixture: easymeta_single_missing_resource
hidden_fixture: easymeta_hidden_single_missing_resource
max_score: 10
timeout_minutes: 15
max_agent_steps: 40

prompt: |
  Determine the single blocking fault that prevents this shotgun metagenomics
  workflow from proceeding. Inspect the workspace evidence, do not download
  resources, and report the root cause and a minimal safe fix in the standard
  structured diagnosis format.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: true
  real_tool_execution: false
  network: false

expected_artifacts: [final_answer.md, final_answer.json]

scoring:
  resource_evidence:
    points: 2
    function: check_json_contract
    args:
      equals: {cause: missing_resource}
      nonempty_paths: [resource, config_key, path, fix]
  structured_missing_resource_diagnosis: 6
  diagnostic_no_download: 2

failure_codes: [artifact_missing, diagnosis_wrong, diagnosis_incomplete, timeout]
