task_id: T09
name: Plan metatranscriptomics
plugin: metatranscriptomics
task_type: planning
fixture: transcriptomics_valid
max_score: 8
timeout_minutes: 15
max_agent_steps: 40

prompt: |
  Create an execution plan for metatranscriptomics analysis
  on the transcriptomics fixture. The plan must include:
  - analysis_type "metatranscriptomics"
  - fastp for quality control
  - STAR or HISAT2 for alignment
  - featureCounts for quantification
  Do not execute any real bioinformatics tools.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: false
  real_tool_execution: false
  network: false

expected_artifacts:
  - execution_plan.json

scoring:
  execution_plan_exists:
    points: 1
    args:
      relpath: "execution_plan.json"
  analysis_type_metatranscriptomics:
    points: 2
    args:
      relpath: "execution_plan.json"
      field: "analysis_type"
      expected: "metatranscriptomics"
  step_ids_unique:
    points: 1
  tool_ids_valid:
    points: 1
  plan_contains_fastp:
    points: 1
  plan_contains_aligner:
    points: 1
  plan_contains_featurecounts:
    points: 1

failure_codes:
  - artifact_missing
  - wrong_analysis_type
  - invalid_plan_schema
  - invalid_command
  - real_execution_violation
  - timeout
  - agent_loop
