task_id: T01
name: List analysis types
plugin: all
task_type: discovery
fixture: plasmid_valid
max_score: 9
timeout_minutes: 15
max_agent_steps: 20

prompt: |
  List all available bioinformatics analysis types that you can perform.
  Use the available tools to discover what analysis types are supported.
  Write final_answer.json with schema_version, task_type="discovery",
  analysis_types, count, and discovery_evidence.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: false
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  discovery_targets:
    points: 5
    function: check_json_contract
    args:
      equals:
        task_type: discovery
        count: 7
      unordered_equals:
        analysis_types: [metagenomic_plasmid, metatranscriptomics, amplicon_16s, rnaseq_expression, wgs_bacteria, easymetagenome, viral_viwrap]
      nonempty_paths: [discovery_evidence]
  structured_discovery: 3
  final_answer_has_structure: 1

failure_codes:
  - artifact_missing
  - wrong_analysis_type
  - timeout
  - agent_loop
