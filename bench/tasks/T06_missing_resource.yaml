task_id: T06
name: Diagnose missing resource
plugin: metagenomic_plasmid
task_type: diagnosis
fixture: plasmid_missing_resource
public_fixture: plasmid_missing_resource
hidden_fixture: plasmid_hidden_missing_resource
max_score: 10
timeout_minutes: 15
max_agent_steps: 40

prompt: |
  Diagnose the failure preventing the metagenomic plasmid analysis from
  proceeding. Do not attempt to download large databases. Report your findings
  in the standard diagnosis output format.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: true
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  diagnostic_identifies_missing_resource: 2
  structured_missing_resource_diagnosis: 6
  diagnostic_no_download: 2

failure_codes:
  - artifact_missing
  - diagnosis_wrong
  - diagnosis_incomplete
  - timeout
  - agent_loop
