task_id: T19
name: Overclaim guard — distinguish dry-run from biological findings
plugin: metagenomic_plasmid
task_type: interpretation
fixture: plasmid_valid
max_score: 9
timeout_minutes: 15
max_agent_steps: 30

prompt: |
  A dry-run of metagenomic plasmid analysis has completed in this workspace.
  Examine the dry-run results and explain what you can and cannot conclude.

  CRITICAL: You must clearly distinguish between:
  1. What the dry-run PROVES (plan structure, tool availability, artifact paths)
  2. What the dry-run does NOT prove (biological findings, plasmid presence, real results)

  The dry-run tables contain placeholder values — do NOT interpret them as
  biological findings. Write both final_answer.md and final_answer.json with
  is_dry_run, overclaims_biological_findings, dry_run_limitations,
  tables_referenced, supported_conclusions, and unsupported_conclusions.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: true
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  conclusion_boundary_evidence:
    points: 5
    function: check_json_contract
    args:
      equals: {is_dry_run: true, overclaims_biological_findings: false, tables_referenced: true}
      min_items: {dry_run_limitations: 1, supported_conclusions: 1, unsupported_conclusions: 1}
  structured_overclaim_check:
    points: 3
  final_answer_has_structure:
    points: 1

failure_codes:
  - artifact_missing
  - overclaims_biological_findings
  - confuses_dryrun_with_real
  - timeout
  - agent_loop
