task_id: T46
name: Cross-review verification — compare independent review artifacts
plugin: metagenomic_plasmid
task_type: multi_agent
fixture: plasmid_valid
max_score: 14
timeout_minutes: 20
max_agent_steps: 40

prompt: |
  You have metagenomic_plasmid results plus two independently generated review
  artifacts: reviews/review_a.json and reviews/review_b.json.

  Your task:
  1. Read both review artifacts and verify their claims against provenance files
  2. Identify conclusions supported by both reviews
  3. Identify disagreements and preserve each review's actual position
  4. Produce a confidence assessment based on agreement and source evidence

  Write to final_answer.json:
  {
    "schema_version": "abi-bench.final_answer.v1",
    "task_type": "multi_agent",
    "source_reviews": ["review_a", "review_b"],
    "robust_findings": ["<finding that either model would confirm>"],
    "model_dependent_findings": [
      {"finding": "<...>", "primary_view": "<...>", "alternate_view": "<...>"}
    ],
    "uncertainty_sources": ["data_ambiguity", "tool_interpretation", "biological_assumption"],
    "confidence_summary": "<overall confidence assessment>"
  }

allowed_actions:
  read_files: true
  write_files: true
  run_shell: true
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  robust_findings_identified:
    points: 10
    function: check_cross_review_comparison
  model_dependent_flagged:
    points: 2
    function: check_json_contract
    args:
      required_paths: [model_dependent_findings, uncertainty_sources]
  confidence_assessed:
    points: 2
    function: check_json_contract
    args:
      nonempty_paths: [confidence_summary]

failure_codes:
  - artifact_missing
  - overclaim_result
  - timeout
