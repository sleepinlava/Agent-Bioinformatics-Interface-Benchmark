# bench/tasks/T36_figure_validation.yaml
task_id: T36
name: Figure validation — verify rendered scientific figures
plugin: metagenomic_plasmid
task_type: figure_validation
fixture: figure_validation_clean
max_score: 12
timeout_minutes: 15
max_agent_steps: 30

prompt: |
  You have a metagenomic_plasmid analysis workspace with pre-generated results.
  The figures/ directory contains scientific charts rendered by abi-sciplot.

  Your task:
  1. List all figure files in figures/ (PNG, SVG, PDF)
  2. For each figure:
     - Verify file is non-empty (> 0 bytes)
     - Check resolution (≥ 150 DPI for raster formats)
     - Run `abi-sciplot lint --spec <spec_file>` if spec file exists
     - Verify the figure data matches the source table
  3. Record all findings with specific paths and metric values

  Write to final_answer.json:
  {
    "schema_version": "abi-bench.final_answer.v1",
    "task_type": "figure_validation",
    "figures": [
      {
        "path": "figures/<name>.png",
        "plot_type": "bar|volcano|pca|heatmap|...",
        "file_size_bytes": <N>,
        "format": "png|svg|pdf",
        "dpi": <N|null>,
        "resolution_checked": true/false,
        "lint_passed": true/false,
        "data_consistent": true/false,
        "issues": ["description of any problems found"]
      }
    ],
    "summary": {"total": <N>, "valid": <N>, "issues_found": <N>}
  }

allowed_actions:
  read_files: true
  write_files: true
  run_shell: true
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  figures_enumerated:
    points: 3
    function: check_reported_paths_exist
    args:
      list_path: figures
      path_field: path
      size_field: file_size_bytes
      require_all_workspace_files: "figures/*"
  dpi_verified:
    points: 3
    function: check_json_expected_records
    args:
      list_path: figures
      key_field: path
      required_fields: [format, dpi, resolution_checked]
      expected_records:
        figures/alpha_diversity.svg: {format: svg, dpi: null, resolution_checked: true}
        figures/qc_summary.svg: {format: svg, dpi: null, resolution_checked: true}
  lint_executed:
    points: 3
    function: check_command_trace_evidence
    args:
      required_patterns: ["abi-sciplot\\s+lint"]
  data_consistency_checked:
    points: 3
    function: check_json_expected_records
    args:
      list_path: figures
      key_field: path
      required_fields: [data_consistent, issues]
      expected_records:
        figures/alpha_diversity.svg: {data_consistent: true}
        figures/qc_summary.svg: {data_consistent: true}

failure_codes:
  - artifact_missing
  - timeout
  - agent_loop
