task_id: T04
name: Inspect plasmid dry-run
plugin: metagenomic_plasmid
task_type: inspection
fixture: plasmid_valid
max_score: 14
timeout_minutes: 15
max_agent_steps: 40

prompt: |
  Inspect the dry-run results for metagenomic plasmid analysis.
  Read the provenance artifacts and report:
  1. How many steps are dry_run, skipped, or failed.
  2. Identify any placeholder values or missing resources.
  3. Recommend the next safe step.

  Write both final_answer.md and final_answer.json. JSON must include the status
  counts, total_steps, execution_mode, placeholders, and safe_next_step.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: false
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  provenance_counts_evidence:
    points: 4
    function: check_json_contract
    args:
      equals: {dry_run_count: 4, skipped_count: 0, failed_count: 0, total_steps: 4}
  placeholder_evidence:
    points: 2
    function: check_json_contract
    args: {min_items: {placeholders: 2}}
  safe_next_step_evidence:
    points: 2
    function: check_json_contract
    args: {nonempty_paths: [safe_next_step]}
  structured_inspection: 4
  final_answer_has_structure: 1
  artifact_freshness_verified: 1

failure_codes:
  - artifact_missing
  - diagnosis_wrong
  - diagnosis_incomplete
  - overclaim_result
  - timeout
  - agent_loop
