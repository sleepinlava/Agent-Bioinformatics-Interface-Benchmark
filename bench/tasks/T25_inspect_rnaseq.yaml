task_id: T25
name: Inspect rnaseq dry-run results
plugin: rnaseq_expression
task_type: inspection
fixture: rnaseq_valid
max_score: 8
timeout_minutes: 15
max_agent_steps: 40

prompt: |
  Inspect the dry-run results for rnaseq_expression analysis.
  Read the provenance artifacts and report:
  1. Identify the genome index placeholder (STAR index path).
  2. Identify the annotation GTF placeholder.
  3. Determine whether DESeq2 step was skipped (no real execution).
  4. Report how many samples were in the sample sheet.
  5. List what must be configured before real execution.

  Write both final_answer.md and final_answer.json. The JSON must include:
  task_type (use "inspection"), genome_index_placeholder, annotation_gtf_placeholder,
  deseq2_status, sample_count, and real_execution_requirements.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: false
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  structured_inspection_evidence:
    points: 6
    function: check_json_contract
    args:
      equals: {sample_count: 3}
      contains_paths: {deseq2_status: [skipped, dry_run]}
      nonempty_paths: [task_type, genome_index_placeholder, annotation_gtf_placeholder]
      min_items: {real_execution_requirements: 2}
  final_answer_has_structure: 2

failure_codes:
  - artifact_missing
  - diagnosis_wrong
  - overclaim_result
  - timeout
  - agent_loop
