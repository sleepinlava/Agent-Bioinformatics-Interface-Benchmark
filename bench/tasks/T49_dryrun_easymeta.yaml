task_id: T49
name: Dry-run easymetagenome analysis
plugin: easymetagenome
task_type: dry_run
fixture: easymeta_valid
max_score: 12
timeout_minutes: 20
max_agent_steps: 50

prompt: |
  Run a dry-run for easymetagenome shotgun metagenomics analysis using the
  P0 taxonomy workflow. Produce all provenance artifacts, standard tables,
  and a report. Do NOT execute real bioinformatics tools.

  The P0 taxonomy workflow uses: fastp → KneadData → Kraken2 → Bracken.
  Read config.yaml and the manifest file first.

allowed_actions:
  read_files: true
  write_files: true
  run_shell: true
  real_tool_execution: false
  network: false

expected_artifacts:
  - execution_plan.json
  - provenance/commands.tsv
  - provenance/resolved_inputs.tsv
  - provenance/tool_versions.tsv
  - provenance/resources.json
  - provenance/run_summary.json
  - provenance/progress.jsonl
  - provenance/checksums.json
  - provenance/environment.yml
  - tables/taxonomy_abundance.tsv
  - tables/qc_summary.tsv
  - report/report.md
  - report/report.html

scoring:
  execution_plan_exists: 1
  commands_tsv_exists_and_nonempty: 2
  resolved_inputs_exists: 1
  tool_versions_exists: 1
  resources_json_exists: 1
  run_summary_exists: 1
  progress_jsonl_exists: 1
  tables_exist_with_headers: 1
  report_exists: 1
  statuses_are_dryrun_or_skipped: 1
  no_real_execution: 1

failure_codes:
  - artifact_missing
  - invalid_status
  - real_execution_violation
  - timeout
  - agent_loop
