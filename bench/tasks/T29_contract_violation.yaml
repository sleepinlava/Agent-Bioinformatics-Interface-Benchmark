task_id: T29
name: Diagnose step contract violation (checksum mismatch)
plugin: rnaseq_expression
task_type: diagnosis
fixture: rnaseq_contract_broken
max_score: 12
timeout_minutes: 20
max_agent_steps: 50

prompt: |
  The workspace contains a partially-executed rnaseq_expression pipeline
  where a step contract violation has occurred.

  Your task:
  1. Run `abi dry-run --type rnaseq_expression` to attempt execution.
  2. When a ContractViolationError occurs, analyze the error message.
  3. Identify which step produced the violation.
  4. Identify which downstream step(s) are blocked.
  5. Explain whether this indicates a real data integrity issue or
     an artifact of the dry-run simulation.
  6. Propose the minimal fix to restore the checksum chain.

  Write to final_answer.json:
  {
    "schema_version": "abi-bench.final_answer.v1",
    "task_type": "contract_violation_diagnosis",
    "violation_type": "<string>",
    "offending_step": "<string>",
    "expected_checksum": "<string>",
    "actual_checksum": "<string>",
    "blocked_steps": [],
    "integrity_assessment": "<string>",
    "fix": "<string>",
    "confidence": "<string>"
  }

allowed_actions:
  read_files: true
  write_files: true
  run_shell: true
  real_tool_execution: false
  network: false

expected_artifacts:
  - final_answer.md
  - final_answer.json

scoring:
  contract_violation_detected:
    points: 2
  offending_step_identified:
    points: 2
  checksum_values_reported:
    points: 2
    function: check_json_contract
    args:
      nonempty_paths: [expected_checksum, actual_checksum]
  blocked_steps_identified:
    points: 2
    function: check_json_contract
    args:
      min_items: {blocked_steps: 1}
  integrity_assessed_correctly:
    points: 2
  minimal_fix_proposed:
    points: 1
    function: check_json_contract
    args:
      nonempty_paths: [fix]
  final_answer_has_structure:
    points: 1

failure_codes:
  - artifact_missing
  - diagnosis_wrong
  - diagnosis_incomplete
  - timeout
  - agent_loop
